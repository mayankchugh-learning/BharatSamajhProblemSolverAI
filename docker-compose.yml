version: "3.9"

services:
  # ── PostgreSQL Database ──
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: bharatsolve
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: bharatsolve
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bharatsolve"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── BharatSolve AI Application ──
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://bharatsolve:${POSTGRES_PASSWORD:-changeme}@db:5432/bharatsolve
      SESSION_SECRET: ${SESSION_SECRET:-change-this-to-a-strong-random-secret}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      AI_INTEGRATIONS_OPENAI_BASE_URL: ${AI_INTEGRATIONS_OPENAI_BASE_URL:-}
      BASE_URL: ${BASE_URL:-https://bharatsolve.ai}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-}
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  # ── Schema Migration (run once) ──
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    environment:
      DATABASE_URL: postgresql://bharatsolve:${POSTGRES_PASSWORD:-changeme}@db:5432/bharatsolve
    command: npm run db:migrate
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - migrate

volumes:
  pgdata:
  uploads:
